[task_config]
includes = [".mise/tasks"]

[tasks.nix-rebuild]
description = "Apply darwin-rebuild (updates flake by default); logs to temp file"
file = "./.mise/tasks/nix-rebuild"

[tasks.pi-refresh]
description = "Refresh nix-managed pi packages for personal + work profiles"
file = "./.mise/tasks/pi-refresh"

[tasks.pi-model-usage]
description = "Summarize Pi parent/subagent model usage from session logs"
file = "./.mise/tasks/pi-model-usage"
quiet = true

[tasks.pi-model-usage-dashboard]
description = "Build local HTML dashboard for Pi model usage"
file = "./.mise/tasks/pi-model-usage-dashboard"
quiet = true

[tasks.pi-m]
description = "Alias for pi-model-usage"
file = "./.mise/tasks/pi-m"
quiet = true
